spring:
  application:
    name: smartfarm

  datasource:
    url: jdbc:postgresql://localhost:5433/smartfarm
    username: smartfarm
    password: smartfarm1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

mqtt:
  broker-url: tcp://localhost:1884
  client-id: smartfarm-backend
  topics:
    sensor-data: smartfarm/+/sensor/#
    control-response: smartfarm/+/control/response

control:
  mode: rule   # rule | ml (ml 로 변경 시 FastAPI ML 서비스 연동 활성화)

jwt:
  secret: change-this-to-a-secure-random-secret-in-production
  expiration-ms: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.smartfarm: DEBUG

server:
  port: 8080
