spring:
  application:
    name: smartfarm

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:smartfarm}
    username: ${DB_USER:smartfarm}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1884}
  client-id: ${MQTT_CLIENT_ID:smartfarm-backend}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}
  topics:
    sensor-data: smartfarm/+/sensor/#
    control-response: smartfarm/+/control/response

control:
  mode: ${CONTROL_MODE:rule}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.smartfarm: DEBUG

server:
  port: 8080
